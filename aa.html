<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPro Partner App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #0a1628;
            overflow: hidden;
        }

        /* ── Animated background orbs ── */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }
        .bg-orb-1 { width:500px;height:500px;background:radial-gradient(circle,#1565C0,transparent);top:-150px;left:-150px;animation-delay:0s; }
        .bg-orb-2 { width:400px;height:400px;background:radial-gradient(circle,#0D47A1,transparent);bottom:-100px;right:-100px;animation-delay:-4s; }
        .bg-orb-3 { width:300px;height:300px;background:radial-gradient(circle,#1976D2,transparent);top:40%;left:50%;transform:translate(-50%,-50%);animation-delay:-2s; }
        @keyframes float {
            0%,100% { transform:translate(0,0) scale(1); }
            33%      { transform:translate(30px,-20px) scale(1.05); }
            66%      { transform:translate(-20px,15px) scale(0.97); }
        }

        /* ── Card ── */
        .card {
            position: relative;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 40px 32px 36px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
        }

        /* ── Logo ── */
        .logo-wrap { position:relative;width:88px;height:88px;margin:0 auto 24px; }
        .logo-ring {
            position:absolute;inset:-6px;border-radius:28px;
            border:1.5px solid rgba(99,179,237,0.35);
            animation:ring-pulse 3s ease-in-out infinite;
        }
        .logo-ring-2 {
            position:absolute;inset:-12px;border-radius:32px;
            border:1px solid rgba(99,179,237,0.15);
            animation:ring-pulse 3s ease-in-out infinite;animation-delay:-1s;
        }
        @keyframes ring-pulse {
            0%,100%{opacity:0.6;transform:scale(1);}
            50%{opacity:1;transform:scale(1.04);}
        }
        .logo {
            width:88px;height:88px;
            background:linear-gradient(145deg,#1565C0,#0D47A1);
            border-radius:24px;
            display:flex;align-items:center;justify-content:center;
            color:white;font-size:36px;font-weight:900;
            box-shadow:0 12px 30px rgba(13,86,166,0.6),0 0 0 1px rgba(255,255,255,0.15) inset;
            letter-spacing:-1px;position:relative;
        }

        .app-name { font-size:24px;font-weight:800;color:#fff;margin-bottom:6px;letter-spacing:-0.5px; }
        .app-tagline { font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:24px;line-height:1.6; }

        /* ── Pills ── */
        .pills { display:flex;justify-content:center;gap:8px;margin-bottom:28px;flex-wrap:wrap; }
        .pill {
            display:flex;align-items:center;gap:5px;
            background:rgba(255,255,255,0.07);
            border:1px solid rgba(255,255,255,0.1);
            border-radius:20px;padding:5px 12px;
            font-size:11px;color:rgba(255,255,255,0.5);font-weight:500;
        }
        .pill-dot { width:6px;height:6px;border-radius:50%;background:#4ade80;animation:blink 2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1;}50%{opacity:0.3;} }

        /* ── State box (loading / result) ── */
        .state-box {
            padding: 20px 16px;
            border-radius: 16px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .state-box.loading {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .state-box.success {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.25);
        }
        .state-box.redirecting {
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.25);
        }

        .state-icon { font-size: 32px; line-height: 1; }
        .state-title { font-size: 15px; font-weight: 700; color: #fff; }
        .state-sub   { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.5; }

        /* Spinner */
        .big-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Progress bar */
        .progress-wrap {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 4px;
        }
        .progress-bar {
            height: 100%;
            background: #60a5fa;
            border-radius: 2px;
            width: 0%;
            transition: width 2.4s linear;
        }

        /* ── Manual fallback button (only shown if auto fails) ── */
        .btn {
            display: flex;align-items:center;justify-content:center;gap:10px;
            width:100%;padding:16px 20px;border-radius:14px;
            font-size:15px;font-weight:700;text-decoration:none;
            border:none;cursor:pointer;letter-spacing:0.1px;
            margin-bottom:10px;
            transition:transform 0.15s,box-shadow 0.15s;
        }
        .btn:active { transform:scale(0.98); }
        .btn-primary {
            background:linear-gradient(135deg,#1976D2,#1565C0);
            color:white;
            box-shadow:0 8px 24px rgba(21,101,192,0.45);
        }
        .btn-secondary {
            background:rgba(255,255,255,0.07);
            color:rgba(255,255,255,0.7);
            border:1px solid rgba(255,255,255,0.15);
            font-size:13px;padding:13px 20px;
        }

        .note { font-size:11px;color:rgba(255,255,255,0.2);margin-top:16px;line-height:1.6; }
        .hidden { display:none!important; }
        .desktop-msg { font-size:14px;color:rgba(255,255,255,0.5);line-height:1.7; }
    </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div class="card">

    <div class="logo-wrap">
        <div class="logo-ring-2"></div>
        <div class="logo-ring"></div>
        <div class="logo">U</div>
    </div>

    <div class="app-name">UPro Partner</div>
    <p class="app-tagline">You've been invited to join.<br>Redirecting you automatically…</p>

    <div class="pills">
        <div class="pill"><span class="pill-dot"></span>Secure Invite</div>
        <div class="pill">Android &amp; iOS</div>
    </div>

    <!-- Dynamic state area -->
    <div id="stateArea"></div>

    <!-- Manual fallback buttons (hidden initially) -->
    <div id="fallbackBtns" class="hidden"></div>

    <p class="note" id="note"></p>
</div>

<script>
(function () {
    // ── Params ────────────────────────────────────────────────
    var p        = new URLSearchParams(window.location.search);
    var orgId    = p.get('org_id')   || '';
    var type     = p.get('type')     || '';
    var currency = p.get('currency') || '';

    // ── Device ────────────────────────────────────────────────
    var ua        = navigator.userAgent;
    var isIOS     = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    var isAndroid = /Android/.test(ua);
    var isMobile  = isIOS || isAndroid;

    // ── Links ─────────────────────────────────────────────────
    var deepLink = 'unitepro://open'
        + '?org_id='   + encodeURIComponent(orgId)
        + '&type='     + encodeURIComponent(type)
        + '&currency=' + encodeURIComponent(currency);

    // Native app scheme — opens Play Store / App Store app directly (not browser)
    var playStoreNative = 'market://details'
        + '?id=com.customer.unite.pro'
        + '&referrer=org_id%3D' + encodeURIComponent(orgId)
        + '%26type%3D'          + encodeURIComponent(type)
        + '%26currency%3D'      + encodeURIComponent(currency);

    var appStoreNative = 'itms-apps://itunes.apple.com/us/app/unitepro-customer/id6761455372';

    // Web fallback (if native scheme fails)
    var playStoreWeb = 'https://play.google.com/store/apps/details'
        + '?id=com.customer.unite.pro'
        + '&referrer=org_id%3D' + encodeURIComponent(orgId)
        + '%26type%3D'          + encodeURIComponent(type)
        + '%26currency%3D'      + encodeURIComponent(currency);

    var appStoreWeb = 'https://apps.apple.com/us/app/unitepro-customer/id6761455372';

    var storeNative = isIOS ? appStoreNative : playStoreNative;
    var storeWeb    = isIOS ? appStoreWeb    : playStoreWeb;
    var storeUrl    = storeNative;  // primary — native app
    var storeName = isIOS ? 'App Store' : 'Play Store';
    var storeIcon = isIOS ? '🍎' : '▶️';

    var stateArea    = document.getElementById('stateArea');
    var fallbackBtns = document.getElementById('fallbackBtns');
    var note         = document.getElementById('note');

    // ════════════════════════════════════════════════════════
    // DESKTOP — show simple message
    // ════════════════════════════════════════════════════════
    if (!isMobile) {
        stateArea.innerHTML =
            '<div class="state-box redirecting">' +
              '<div class="state-icon">💻</div>' +
              '<div class="state-title">Mobile Only</div>' +
              '<div class="state-sub">Open this link on your Android or iOS device to install or launch UPro Partner.</div>' +
            '</div>';
        return;
    }

    // ════════════════════════════════════════════════════════
    // STEP 1 — Show loading state with progress bar
    // ════════════════════════════════════════════════════════
    stateArea.innerHTML =
        '<div class="state-box loading" id="loadingBox">' +
          '<div class="big-spinner"></div>' +
          '<div class="state-title">Checking your device…</div>' +
          '<div class="state-sub">Attempting to open UPro Partner App</div>' +
          '<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>' +
        '</div>';

    note.textContent = 'Please wait — you\'ll be redirected automatically.';

    // Start progress animation
    setTimeout(function () {
        var bar = document.getElementById('progressBar');
        if (bar) bar.style.width = '100%';
    }, 50);

    // ════════════════════════════════════════════════════════
    // STEP 2 — Attempt deep link immediately
    // No button click needed — works on Android Chrome & iOS Safari
    // via location.href (iOS requires this to be triggered quickly
    // after page load — within ~1s — to be treated as user-initiated)
    // ════════════════════════════════════════════════════════
    var t0 = Date.now();
    window.location.href = deepLink;

    // ════════════════════════════════════════════════════════
    // STEP 3 — After 2.6s check if page is still active
    // If app opened → browser backgrounded → timer delayed >> 2600ms
    // If not installed → page stays → timer fires ~exactly at 2600ms
    // ════════════════════════════════════════════════════════
    var checkTimer = setTimeout(function () {
        var elapsed = Date.now() - t0;

        if (elapsed > 4000) {
            // App opened successfully — page came back to foreground
            showAppOpened();
        } else {
            // Still on page → app NOT installed → go to store automatically
            showRedirectingToStore();
        }
    }, 2600);

    // ── Also listen for page visibility change ────────────────
    // When app opens, page becomes hidden. When user returns, visible.
    var appLaunched = false;
    document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
            // Page hidden = app likely opened
            appLaunched = true;
        } else if (appLaunched) {
            // Came back from app
            clearTimeout(checkTimer);
            showAppOpened();
        }
    });

    // ════════════════════════════════════════════════════════
    // APP OPENED STATE
    // ════════════════════════════════════════════════════════
    function showAppOpened() {
        appLaunched = true;
        stateArea.innerHTML =
            '<div class="state-box success">' +
              '<div class="state-icon">✅</div>' +
              '<div class="state-title" style="color:#6ee7b7">App Opened!</div>' +
              '<div class="state-sub">UPro Partner is opening on your device.</div>' +
            '</div>';

        // Fallback button in case they want to re-open
        fallbackBtns.classList.remove('hidden');
        fallbackBtns.innerHTML =
            '<a class="btn btn-secondary" href="' + deepLink + '">' +
              'Tap to re-open app' +
            '</a>';

        note.textContent = 'Switch to the UPro Partner app on your device.';
    }

    // ════════════════════════════════════════════════════════
    // NOT INSTALLED — redirect to store automatically
    // ════════════════════════════════════════════════════════
    function showRedirectingToStore() {
        stateArea.innerHTML =
            '<div class="state-box redirecting" id="storeBox">' +
              '<div class="state-icon">' + storeIcon + '</div>' +
              '<div class="state-title">Redirecting to ' + storeName + '…</div>' +
              '<div class="state-sub">UPro Partner is not installed. Taking you to the store to install it.</div>' +
              '<div class="progress-wrap"><div class="progress-bar" id="storeBar"></div></div>' +
            '</div>';

        note.textContent = 'You\'ll be taken to ' + storeName + ' automatically.';

        // Animate progress then redirect
        setTimeout(function () {
            var bar = document.getElementById('storeBar');
            if (bar) bar.style.width = '100%';
        }, 50);

        // Redirect to store after 1.5s — native scheme first, web fallback
        setTimeout(function () {
            var t1 = Date.now();

            // Try native scheme (opens Play Store / App Store app directly)
            window.location.href = storeNative;

            // After 1.5s — if still here, native scheme failed → try web URL
            setTimeout(function () {
                var elapsed2 = Date.now() - t1;
                if (elapsed2 < 2500) {
                    // Native scheme didn't work — open web store URL
                    window.location.href = storeWeb;
                }
            }, 1500);

            // Fallback manual button in case both redirects blocked
            setTimeout(function () {
                fallbackBtns.classList.remove('hidden');
                fallbackBtns.innerHTML =
                    '<a class="btn btn-primary" href="' + storeNative + '" onclick="setTimeout(function(){window.location.href='' + storeWeb + ''},1500)">' +
                      storeIcon + ' Open ' + storeName +
                    '</a>' +
                    '<a class="btn btn-secondary" href="' + deepLink + '">' +
                      'I already installed it — Open App' +
                    '</a>';
                note.textContent = 'Tap above if you were not redirected automatically.';
            }, 3500);
        }, 1500);
    }

})();
</script>
</body>
</html>
