<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPro Partner App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0D56A6 0%, #1976D2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 36px 28px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .logo {
            width: 80px; height: 80px;
            background: #0D56A6;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: 800;
            box-shadow: 0 8px 20px rgba(13,86,166,0.3);
        }
        h1 {
            font-size: 22px;
            color: #1e293b;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .invite {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .btn-open {
            display: block;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            margin-bottom: 12px;
            background: #0D56A6;
            color: white;
            border: none;
            cursor: pointer;
            letter-spacing: 0.3px;
        }
        .btn-store {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            background: white;
            color: #0D56A6;
            border: 2px solid #0D56A6;
            cursor: pointer;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 14px 0;
            color: #94a3b8;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .note {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">U</div>
    <h1>UPro Partner</h1>
    <p class="invite">
        You've been invited to join.<br>
        Open the app to get started.
    </p>

    <!-- ✅ Primary: open app button (user must tap — iOS requires user gesture) -->
    <a id="openBtn" class="btn-open" href="#">
        🚀 Open UPro Partner App
    </a>

    <div class="divider">not installed?</div>

    <!-- Store button shown based on device -->
    <a id="storeBtn" class="btn-store" href="#">
        📱 Install App
    </a>

    <p class="note" id="note"></p>
</div>

<script>
    var p        = new URLSearchParams(window.location.search);
    var orgId    = p.get('org_id')   || '';
    var type     = p.get('type')     || '';
    var currency = p.get('currency') || '';

    var isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    var isAndroid = /Android/.test(navigator.userAgent);

    // Deep link
    var deepLink = 'unitepro://open?org_id=' + encodeURIComponent(orgId)
                 + '&type='     + encodeURIComponent(type)
                 + '&currency=' + encodeURIComponent(currency);

    // Store URLs
    var appStore  = 'https://apps.apple.com/us/app/unitepro-customer/id6761455372';
    var playStore = 'https://play.google.com/store/apps/details'
                  + '?id=com.customer.unite.pro'
                  + '&referrer=org_id%3D' + orgId
                  + '%26type%3D' + type
                  + '%26currency%3D' + currency;

    var openBtn  = document.getElementById('openBtn');
    var storeBtn = document.getElementById('storeBtn');
    var note     = document.getElementById('note');

    openBtn.href = deepLink;

    if (isIOS) {
        storeBtn.href        = appStore;
        storeBtn.textContent = '📱 Install from App Store';
        note.textContent     = 'Tap "Open UPro Partner App" above. If nothing happens, the app is not installed.';
    } else if (isAndroid) {
        storeBtn.href        = playStore;
        storeBtn.textContent = '📱 Install from Play Store';
        note.textContent     = 'Tap "Open UPro Partner App" above. If nothing happens, install the app first.';
    } else {
        // Desktop
        storeBtn.style.display = 'none';
        note.textContent = 'Open this link on your mobile device.';
    }

    // ✅ iOS REQUIRES user tap to open custom scheme
    // Auto-redirect does NOT work in Safari/WhatsApp iOS
    openBtn.addEventListener('click', function(e) {
        e.preventDefault();

        // Try opening app
        window.location.href = deepLink;

        // After 2s if still here = app not installed
        setTimeout(function() {
            var storeUrl = isIOS ? appStore : playStore;
            if (confirm('UPro Partner App not found. Install from store?')) {
                window.location.href = storeUrl;
            }
        }, 2000);
    });
</script>
</body>
</html>
