<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPro Partner App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0D56A6 0%, #1976D2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 36px 28px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .logo {
            width: 80px; height: 80px;
            background: #0D56A6;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: 800;
            box-shadow: 0 8px 20px rgba(13,86,166,0.3);
        }
        h1 { font-size: 22px; color: #1e293b; margin-bottom: 8px; font-weight: 700; }
        .invite { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 28px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
            transition: opacity 0.15s;
        }
        .btn:active { opacity: 0.85; }

        .btn-open {
            background: #0D56A6;
            color: white;
        }
        .btn-install {
            background: white;
            color: #0D56A6;
            border: 2px solid #0D56A6;
            font-size: 14px;
            padding: 14px;
        }

        /* Loading spinner inside button */
        .spinner {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 4px 0 14px;
            color: #94a3b8;
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        /* Status banner */
        .status {
            display: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 14px;
            text-align: left;
            line-height: 1.5;
        }
        .status.info  { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .status.warn  { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }

        .note { font-size: 11px; color: #94a3b8; margin-top: 16px; line-height: 1.5; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">U</div>
    <h1>UPro Partner</h1>
    <p class="invite">
        You've been invited to join.<br>
        Open the app to get started.
    </p>

    <!-- Status banner -->
    <div class="status" id="statusBanner"></div>

    <!-- Open App button (shown when app likely installed) -->
    <a class="btn btn-open" id="openBtn" href="#">
        <span class="spinner" id="openSpinner"></span>
        <span id="openBtnText">Open UPro Partner App</span>
    </a>

    <div class="divider" id="divider">not installed?</div>

    <!-- Install button -->
    <a class="btn btn-install" id="installBtn" href="#">
        <span id="installIcon">📱</span>
        <span id="installBtnText">Install App</span>
    </a>

    <p class="note" id="note"></p>
</div>

<script>
(function () {
    // ── Parse URL params ──────────────────────────────────────
    var p        = new URLSearchParams(window.location.search);
    var orgId    = p.get('org_id')   || '';
    var type     = p.get('type')     || '';
    var currency = p.get('currency') || '';

    // ── Device detection ─────────────────────────────────────
    var ua        = navigator.userAgent;
    var isIOS     = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    var isAndroid = /Android/.test(ua);
    var isMobile  = isIOS || isAndroid;

    // ── Links ─────────────────────────────────────────────────
    var deepLink = 'unitepro://open'
        + '?org_id='    + encodeURIComponent(orgId)
        + '&type='      + encodeURIComponent(type)
        + '&currency='  + encodeURIComponent(currency);

    var appStore  = 'https://apps.apple.com/us/app/unitepro-customer/id6761455372';
    var playStore = 'https://play.google.com/store/apps/details'
        + '?id=com.customer.unite.pro'
        + '&referrer=org_id%3D' + encodeURIComponent(orgId)
        + '%26type%3D'           + encodeURIComponent(type)
        + '%26currency%3D'       + encodeURIComponent(currency);

    var storeUrl  = isIOS ? appStore : playStore;
    var storeName = isIOS ? 'App Store' : 'Play Store';

    // ── DOM refs ──────────────────────────────────────────────
    var openBtn       = document.getElementById('openBtn');
    var openBtnText   = document.getElementById('openBtnText');
    var openSpinner   = document.getElementById('openSpinner');
    var installBtn    = document.getElementById('installBtn');
    var installBtnText= document.getElementById('installBtnText');
    var installIcon   = document.getElementById('installIcon');
    var divider       = document.getElementById('divider');
    var statusBanner  = document.getElementById('statusBanner');
    var note          = document.getElementById('note');

    // ── Desktop: show only "open on mobile" message ───────────
    if (!isMobile) {
        openBtn.classList.add('hidden');
        divider.classList.add('hidden');
        installBtn.classList.add('hidden');
        showStatus('info', '💻 Open this link on your mobile device to install or open the app.');
        note.textContent = 'This link works on Android and iOS devices.';
        return;
    }

    // ── Set install button label ──────────────────────────────
    installBtnText.textContent = 'Install from ' + storeName;
    installBtn.href = storeUrl;

    // ── Note text ─────────────────────────────────────────────
    note.textContent = 'If "Open App" doesn\'t work, the app is not installed on this device.';

    // ════════════════════════════════════════════════════════
    // OPEN APP BUTTON
    // Tries deep link → waits 2.5s → if still on page = not installed
    // Shows install button prominently
    // ════════════════════════════════════════════════════════
    openBtn.addEventListener('click', function (e) {
        e.preventDefault();

        // Show spinner + change text
        openSpinner.style.display = 'block';
        openBtnText.textContent = 'Opening app…';
        openBtn.style.pointerEvents = 'none';

        hideStatus();

        // Record time before attempting deep link
        var t0 = Date.now();

        // Attempt to open app
        window.location.href = deepLink;

        // After 2500ms — if page is still active, app is not installed
        setTimeout(function () {
            // If user left the page (app opened), Date.now() will lag
            // due to page being backgrounded — elapsed will be >> 2500ms
            var elapsed = Date.now() - t0;

            // Reset button
            openSpinner.style.display = 'none';
            openBtn.style.pointerEvents = 'auto';

            // If elapsed is close to timeout → page stayed active → app NOT installed
            if (elapsed < 1000) {
                // App not installed
                openBtnText.textContent = 'App Not Installed';
                openBtn.style.background = '#94a3b8';
                openBtn.style.cursor = 'default';
                openBtn.style.pointerEvents = 'none';

                // Highlight install button
                installBtn.style.background  = '#0D56A6';
                installBtn.style.color       = 'white';
                installBtn.style.borderColor = '#0D56A6';
                installBtnText.textContent   = '⬇️  Install from ' + storeName;

                showStatus('warn',
                    '📲 UPro Partner App is not installed on this device.\n' +
                    'Tap the button below to install it from the ' + storeName + '.');

                divider.classList.add('hidden');
            } else {
                // Elapsed >> timeout → page was backgrounded → app opened ✓
                openBtnText.textContent = 'Open UPro Partner App';
            }
        }, 2500);
    });

    // ── Install button ────────────────────────────────────────
    installBtn.addEventListener('click', function (e) {
        // Let href handle it — just update text briefly
        installBtnText.textContent = 'Opening ' + storeName + '…';
        setTimeout(function () {
            installBtnText.textContent = 'Install from ' + storeName;
        }, 3000);
    });

    // ════════════════════════════════════════════════════════
    // AUTO-OPEN on Android (Chrome supports it without user tap)
    // iOS Safari REQUIRES user gesture — skip auto on iOS
    // ════════════════════════════════════════════════════════
    if (isAndroid) {
        var t0 = Date.now();
        window.location.href = deepLink;

        setTimeout(function () {
            var elapsed = Date.now() - t0;
            if (elapsed < 3500) {
                // Still on page — app not installed, highlight install
                installBtn.style.background  = '#0D56A6';
                installBtn.style.color       = 'white';
                installBtn.style.borderColor = '#0D56A6';
                installBtnText.textContent   = '⬇️  Install from ' + storeName;
                openBtnText.textContent      = 'App Not Installed';
                openBtn.style.background     = '#94a3b8';
                openBtn.style.pointerEvents  = 'none';
                divider.classList.add('hidden');
                showStatus('warn',
                    '📲 UPro Partner App is not installed.\n' +
                    'Tap below to install from ' + storeName + '.');
            }
            // else: app opened — user is gone from page
        }, 2500);
    }

    // ── Helpers ───────────────────────────────────────────────
    function showStatus(type, msg) {
        statusBanner.className = 'status ' + type;
        statusBanner.style.display = 'block';
        // preserve line breaks
        statusBanner.innerHTML = msg.replace(/\n/g, '<br>');
    }
    function hideStatus() {
        statusBanner.style.display = 'none';
    }

})();
</script>
</body>
</html>
